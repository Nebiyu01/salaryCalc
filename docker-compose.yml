services:
  db:
    image: postgres:16-alpine
    container_name: salary-calc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: salarycalc
      POSTGRES_PASSWORD: salarycalc_dev_password
      POSTGRES_DB: salarycalc
    ports:
      - "5432:5432"
    volumes:
      - salary_calc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salarycalc -d salarycalc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  salary_calc_pgdata:
